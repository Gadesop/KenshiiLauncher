name: Build Kenify Launcher APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x ./ZalithLauncher/gradlew

    - name: Build Debug APK
      run: |
        cd ZalithLauncher
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: Kenify-Launcher-APK
        path: ZalithLauncher/app/build/outputs/apk/debug/*.apk
