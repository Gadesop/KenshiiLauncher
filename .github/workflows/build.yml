name: Build Kenify Launcher APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: sdkmanager "ndk;26.3.11579264"

    - name: Find and Build APK
      run: |
        GRADLEW=$(find . -name "gradlew" -type f | head -n 1)
        echo "Found gradlew at: $GRADLEW"
        GRADLE_DIR=$(dirname "$GRADLEW")
        
        cd "$GRADLE_DIR"
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Kenify-Launcher-APK
        path: "**/build/outputs/apk/debug/*.apk"
